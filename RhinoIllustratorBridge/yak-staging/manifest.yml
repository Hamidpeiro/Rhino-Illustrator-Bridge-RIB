name: RhinoIllustratorBridge
version: 1.0.1
authors:
  - Hamid Peiro
description: >
  Rhino ⇄ Adobe Illustrator Live Sync Plugin.
  Import Illustrator artboards into Rhino as layer-organized
  layouts and export Rhino curves, hatches, annotations, images, and text back to Adobe Illustrator with a single click.
  Supports both Windows (COM) and macOS (AppleScript) workflows.
url: https://github.com/Hamidpeiro/Rhino-Illustrator-Bridge-RIB
keywords:
  - rhino
  - illustrator
  - adobe-illustrator
  - sync
  - export
  - import
  - artboard
  - curves
icon: icon.png
